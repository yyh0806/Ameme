name: Nissin
save_dir: saved/
seed: 1234
target_devices: [0]
n_gpu: 1

arch:
  type: NissinModel
  args: {}

augmentation:
  type: NissinTransforms
  args: {}

data_loader:
  type: NissinDataLoader
  args:
    batch_size: 32
    data_dir: data/nissin/
    nworkers: 2
    shuffle: true
    validation_split: 0.1

loss: nll_loss

lr_scheduler:
  type: StepLR
  args:
    gamma: 0.1
    step_size: 50

metrics:
- top_1_acc
- top_3_acc

optimizer:
  type: Adam
  args:
    lr: 0.0001
    weight_decay: 0

training:
  early_stop: 10
  epochs: 100
  monitor: min val_loss
  save_period: 1
  tensorboard: true
